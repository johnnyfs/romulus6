apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: romulus
spec:
  selector:
    app: worker
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
# NodePort for local Kubernetes development access
apiVersion: v1
kind: Service
metadata:
  name: worker-nodeport
  namespace: romulus
spec:
  selector:
    app: worker
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30808
  type: NodePort
