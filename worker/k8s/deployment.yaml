apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: romulus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: worker-config
            - secretRef:
                name: worker-secrets
          env:
            - name: XDG_DATA_HOME
              value: /data/.local/share
            - name: HOME
              value: /data
          volumeMounts:
            - name: workspaces
              mountPath: /workspaces
            - name: opencode-data
              mountPath: /data/.local/share
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: workspaces
          emptyDir: {}
        - name: opencode-data
          emptyDir: {}
