apiVersion: apps/v1
kind: Deployment
metadata:
  name: romulus-backend
  namespace: romulus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: romulus-backend
  template:
    metadata:
      labels:
        app: romulus-backend
    spec:
      serviceAccountName: romulus-backend
      containers:
        - name: backend
          image: backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: romulus-backend-config
            - secretRef:
                name: romulus-dev-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
