apiVersion: v1
kind: ServiceAccount
metadata:
  name: romulus-backend
  namespace: romulus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: romulus-backend
  namespace: romulus
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: romulus-backend
  namespace: romulus
subjects:
  - kind: ServiceAccount
    name: romulus-backend
    namespace: romulus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: romulus-backend
