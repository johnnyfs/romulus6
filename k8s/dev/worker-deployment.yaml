apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: romulus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-pool
  template:
    metadata:
      labels:
        app: worker-pool
    spec:
      containers:
        - name: worker
          image: worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: worker-config
            - secretRef:
                name: romulus-dev-secrets
          env:
            - name: XDG_DATA_HOME
              value: /data/.local/share
            - name: HOME
              value: /data
            - name: WORKER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKER_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: workspaces
              mountPath: /workspaces
            - name: opencode-data
              mountPath: /data/.local/share
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: workspaces
          emptyDir: {}
        - name: opencode-data
          emptyDir: {}
